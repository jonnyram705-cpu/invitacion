<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Love Forever</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: white;
      font-family: Arial, sans-serif;
    }
    /* Corazón girando */
    .heart {
      font-size: 100px;
      color: red;
      animation: spin 10s linear infinite;
    }
    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }
    #loser {
      font-size: 40px;
      color: #e91e63;
      margin-top: 20px;
      display: none;
      animation: fadeIn 2s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body onclick="mostrarLoser()">
  <div class="heart">❤️</div>
  <div id="loser">loser</div>

  <!-- Música de fondo -->
  <audio id="music" autoplay loop>
    <source src="https://archive.org/download/MassiveAttackAngel/Angel.mp3" type="audio/mpeg">
    Tu navegador no soporta audio.
  </audio>

  <script>
    function mostrarLoser() {
      document.getElementById('loser').style.display = 'block';
    }
  </script>
</body>
</html>
